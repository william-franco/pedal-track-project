name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag da release (ex: v0.1.0)'
        required: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.2"
          channel: "stable"

      - name: Install dependencies
        run: flutter pub get
        working-directory: pedal_track_app

      - name: Build APK Release
        run: flutter build apk --release
        working-directory: pedal_track_app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: pedal_track_app/build/app/outputs/flutter-apk/app-release.apk
